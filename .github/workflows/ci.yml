name: CI

env:
  COMPONENTS_REPOSITORY: TranAnSE/2FA-Vault-Components
  COMPONENTS_REF: main

on:
  push:
    branches: [ master, dev, feature/* ]
  pull_request:
    branches: [ master, dev ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (PHP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, gd, json, mbstring, openssl, tokenizer, xml, pdo_sqlite
          coverage: none

      - name: Copy environment file
        run: cp .env.testing .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel bootstrap directories
        run: mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate Passport keys
        run: php artisan passport:keys --force

      - name: Run backend CI gate
        run: composer run ci:backend

  frontend-build:
    name: Frontend Build (Node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 2FA-Vault
        uses: actions/checkout@v4
        with:
          path: 2FA-Vault

      - name: Checkout 2FA-Vault-Components
        uses: actions/checkout@v4
        with:
          repository: ${{ env.COMPONENTS_REPOSITORY }}
          ref: ${{ env.COMPONENTS_REF }}
          path: 2FA-Vault-Components

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify sibling component dependency layout
        working-directory: ./2FA-Vault
        run: |
          test -d ../2FA-Vault-Components
          test -d ../2FA-Vault-Components/packages/ui
          test -d ../2FA-Vault-Components/packages/formcontrols
          test -d ../2FA-Vault-Components/packages/styles
          test -d ../2FA-Vault-Components/packages/stores

      - name: Install frontend dependencies
        working-directory: ./2FA-Vault
        run: npm ci --no-audit

      - name: Run frontend CI gate
        working-directory: ./2FA-Vault
        run: npm run ci:frontend

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout 2FA-Vault
        uses: actions/checkout@v4
        with:
          path: 2FA-Vault

      - name: Checkout 2FA-Vault-Components
        uses: actions/checkout@v4
        with:
          repository: ${{ env.COMPONENTS_REPOSITORY }}
          ref: ${{ env.COMPONENTS_REF }}
          path: 2FA-Vault-Components

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, gd, json, mbstring, openssl, tokenizer, xml, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Copy environment file
        working-directory: ./2FA-Vault
        run: cp .env.testing .env

      - name: Prepare Laravel bootstrap directories
        working-directory: ./2FA-Vault
        run: mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs

      - name: Install Composer dependencies
        working-directory: ./2FA-Vault
        run: composer install --no-interaction --prefer-dist

      - name: Generate application key
        working-directory: ./2FA-Vault
        run: php artisan key:generate

      - name: Generate Passport keys
        working-directory: ./2FA-Vault
        run: php artisan passport:keys --force

      - name: Verify sibling component dependency layout
        working-directory: ./2FA-Vault
        run: |
          test -d ../2FA-Vault-Components
          test -d ../2FA-Vault-Components/packages/ui
          test -d ../2FA-Vault-Components/packages/formcontrols
          test -d ../2FA-Vault-Components/packages/styles
          test -d ../2FA-Vault-Components/packages/stores

      - name: Install frontend dependencies
        working-directory: ./2FA-Vault
        run: npm ci --no-audit

      - name: Install Playwright browser
        working-directory: ./2FA-Vault
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke gate
        working-directory: ./2FA-Vault
        run: npm run ci:e2e

      - name: Dump Laravel log on failure
        if: failure()
        working-directory: ./2FA-Vault
        run: |
          echo "=== storage/logs/laravel.log ==="
          tail -n 300 storage/logs/laravel.log 2>/dev/null || echo "(no laravel.log)"
          echo "=== storage/logs (all) ==="
          ls -la storage/logs/ 2>/dev/null || echo "(no logs dir)"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            2FA-Vault/test-results/
            2FA-Vault/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: 2fauth-vault:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
