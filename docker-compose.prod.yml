version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2fa-vault-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # App Configuration
      - APP_NAME=${APP_NAME:-2FA-Vault}
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:8000}
      
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-2fa_vault}
      - DB_USERNAME=${DB_USERNAME:-2fa_vault_user}
      - DB_PASSWORD=${DB_PASSWORD}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - REDIS_CACHE_DB=1
      - REDIS_SESSION_DB=2
      - REDIS_QUEUE_DB=3
      
      # Cache & Sessions
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - SESSION_LIFETIME=120
      - QUEUE_CONNECTION=redis
      
      # Encryption
      - ENCRYPTION_ENABLED=true
      - ARGON2_MEMORY=${ARGON2_MEMORY:-65536}
      - ARGON2_TIME=${ARGON2_TIME:-3}
      - ARGON2_THREADS=${ARGON2_THREADS:-4}
      
      # Multi-user Settings
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - MAX_TEAMS_PER_USER=${MAX_TEAMS_PER_USER:-5}
      
      # Web Push (VAPID)
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
      
      # PWA
      - PWA_NAME=${PWA_NAME:-2FA-Vault}
      - PWA_SHORT_NAME=${PWA_SHORT_NAME:-2FA-Vault}
      - PWA_THEME_COLOR=${PWA_THEME_COLOR:-#4F46E5}
      
      # Mail (for team invites, notifications)
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-smtp.mailtrap.io}
      - MAIL_PORT=${MAIL_PORT:-2525}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@2fa-vault.example.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-2FA-Vault}
      
      # Logging
      - LOG_CHANNEL=stack
      - LOG_LEVEL=info
      
      # Rate Limiting
      - THROTTLE_LOGIN=${THROTTLE_LOGIN:-5,1}
      - THROTTLE_API=${THROTTLE_API:-60,1}
      
      # Security
      - TRUSTED_PROXIES=*
      - FORCE_HTTPS=${FORCE_HTTPS:-true}
    
    volumes:
      - ./storage:/var/www/html/storage
      - ./public/uploads:/var/www/html/public/uploads
    
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - 2fa-vault-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: 2fa-vault-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-2fa_vault}
      - MYSQL_USER=${DB_USERNAME:-2fa_vault_user}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_HOST=%
    
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=256M
      --innodb_log_file_size=64M
    
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    
    networks:
      - 2fa-vault-network
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: 2fa-vault-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
    
    volumes:
      - redis-data:/data
    
    networks:
      - 2fa-vault-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy (optional, for production HTTPS)
  nginx:
    image: nginx:alpine
    container_name: 2fa-vault-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    
    depends_on:
      - app
    
    networks:
      - 2fa-vault-network
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for Let's Encrypt SSL (optional)
  certbot:
    image: certbot/certbot
    container_name: 2fa-vault-certbot
    volumes:
      - ./docker/nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    
    networks:
      - 2fa-vault-network

networks:
  2fa-vault-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  certbot-webroot:
    driver: local
